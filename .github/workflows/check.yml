name: IMAX Bookings Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:          # Allow manual trigger

permissions:
  contents: write             # Needed to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run IMAX check
        env:
          GMAIL_APP_PASSWORD_GET_GUNEET: ${{ secrets.GMAIL_APP_PASSWORD_GET_GUNEET }}
        run: node src/index.js

      - name: Commit state if changed
        run: |
          git config user.name "imax-bot"
          git config user.email "bot@github.com"
          git add state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update notification state"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
